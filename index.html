        h2 { color: #0088cc; font-size: 18px; margin-bottom: 20px; }

        .hidden { display: none; }
        .btn-send { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #0088cc; color: white; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.3s; }

        .verse-box { margin-top: 25px; padding: 20px; background: #fdfdfd; border-radius: 20px; border: 2px dashed #0088cc; }

        .btn-verse { background: #1a1a1a; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; }

</head>
<body>

        import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHODkkq-DF_u1KFPhd-K-Ya1yhGDcS2WE",
            authDomain: "esaalny-3588e.firebaseapp.com",
            projectId: "esaalny-3588e",
            storageBucket: "esaalny-3588e.firebasestorage.app",
            messagingSenderId: "532010630852",
            appId: "1:532010630852:web:79e5931fa0b2ff217f1391"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "settings", "service_status"), (doc) => {
            if (doc.exists()) {
                const isClosed = doc.data().closed;
                document.getElementById('serviceContent').style.display = isClosed ? 'none' : 'block';
                document.getElementById('closedMessage').style.display = isClosed ? 'block' : 'none';
            }
        });

        window.toggleFields = () => {
            const method = document.getElementById('replyMethod').value;
            document.getElementById('telegramField').classList.toggle('hidden', method !== 'telegram');
            document.getElementById('emailField').classList.toggle('hidden', method !== 'email');
        };

        window.sendQuestion = async () => {
            const btn = document.getElementById('submitBtn');
            const lastSent = localStorage.getItem("lastSentTime");
            const now = new Date().getTime();
            
            if (lastSent && (now - lastSent < 5 * 60 * 60 * 1000)) {
                alert("مسموح بسؤال كل 5 ساعات.");
                return;
            }

            const qText = document.getElementById('question').value.trim();
            if (!qText) { alert("اكتب سؤالك!"); return; }

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            try {
                await addDoc(collection(db, "questions"), {
                    question: qText,
                    replyMethod: document.getElementById('replyMethod').value,
                    chatId: document.getElementById('chatId').value || "none",
                    userEmail: document.getElementById('userEmail').value || "none",
                    timestamp: serverTimestamp()
                });
                
                await fetch(`https://api.telegram.org/bot8326561499:AAF8y3t3Z9v2E2ryLF0gsP_gvRkZNENkmoU/sendMessage?chat_id=1797024289&text=${encodeURIComponent("🔔 سؤال جديد!\n" + qText)}`);

                localStorage.setItem("lastSentTime", now);
                alert("تم الإرسال بنجاح!");
                location.reload();
            } catch (e) { 
                alert("خطأ في الإرسال."); 
                btn.disabled = false;
                btn.innerText = "إرسال السؤال";
            }
        };

        window.getRandomVerse = () => {

            const btn = document.getElementById('verseBtn');
            const lastTime = localStorage.getItem("lastVerseTime");
            const now = new Date().getTime();
            const fiveHours = 5 * 60 * 60 * 1000;

            if (lastTime && (now - lastTime < fiveHours)) {
                const remainingHours = Math.floor((fiveHours - (now - lastTime)) / (60 * 60 * 1000));
                const remainingMinutes = Math.floor(((fiveHours - (now - lastTime)) % (60 * 60 * 1000)) / (60 * 1000));
                
                alert(`شوفتك يا بكاش و انت عايز آيه تاني 👀😉 بس للاسف الموقع مش هيكتبلك آيه جديده غير بعد خمس ساعات🫣 (باقي: ${remainingHours} ساعة و ${remainingMinutes} دقيقة) يلا بقا روح فكر ف رساله ربنا ليك و قوله انت عايز تقولي اي يا رب 🏃🏻🙏🏻🤎✨`);
                return;
            }

            const randomIndex = Math.floor(Math.random() * verses.length);
            textElement.innerText = `"${verses[randomIndex]}"`;
            textElement.style.display = 'block';
            textElement.style.opacity = 0;

            setTimeout(() => {
                textElement.style.opacity = 1;
                localStorage.setItem("lastVerseTime", now);
                btn.innerText = "رسالة سماوية لك 🤍";
                btn.disabled = true;
            }, 100);
