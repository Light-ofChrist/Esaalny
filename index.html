<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسألني - Light Of Christ</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5283855307401529" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo { width: 150px; height: 150px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 3px solid #0088cc; }
        h1 { color: #333; margin: 5px 0; font-size: 24px; }
        h2 { color: #0088cc; font-size: 18px; margin-bottom: 20px; }
        
        /* تنسيق مكان الإعلان */
        .ad-space { margin: 15px 0; min-height: 100px; background: #fafafa; border: 1px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; }

        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        .hidden { display: none; }
        .btn-send { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #0088cc; color: white; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.3s; }
        .btn-send:disabled { background: #999 !important; cursor: not-allowed; opacity: 0.7; }
        .helper-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-helper { background: #555; color: white; border: none; padding: 10px 5px; border-radius: 8px; font-size: 12px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .footer-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .footer-links a { text-decoration: none; color: #25D366; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        #closedMessage { display: none; padding: 20px; background: #fee; color: #d33; border-radius: 15px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.postimg.cc/YSYx8fj2/IMG-20260313-WA0035.jpg" alt="Light Of Christ" class="logo">
        <h1>Light Of Christ</h1>
        <h2>خدمة اسألني 🕊️</h2>

        <div class="ad-space">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-5283855307401529"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

        <div id="closedMessage">⚠️ اخواتنا اللذاذ 🥰🫣حصل ضغط مسدجات👀 الموقع هيوقف حبه لحد م نرد علي المسدجات اللي موجوده بدل م نتأخر عليكم 🫂🤎.</div>

        <div id="serviceContent">
            <label style="display:block; text-align:right; font-weight:bold; margin-right:5px;">اختر طريقة الرد:</label>
            <select id="replyMethod" onchange="toggleFields()">
                <option value="none">بدون رد (سؤال فقط)</option>
                <option value="telegram">عبر تليجرام</option>
                <option value="email">عبر الإيميل</option>
            </select>

            <div id="telegramField" class="hidden">
                <div class="helper-grid">
                    <a href="https://t.me/userinfobot" target="_blank" class="btn-helper"><i class="fas fa-id-badge"></i> 1. اعرف الـ ID</a>
                    <a href="https://t.me/Essaalny_bot" target="_blank" class="btn-helper"><i class="fab fa-telegram-plane"></i> 2. فعل البوت</a>
                </div>
                <input type="text" id="chatId" placeholder="أدخل معرف تليجرام (ID) هنا">
            </div>

            <div id="emailField" class="hidden">
                <input type="email" id="userEmail" placeholder="أدخل بريدك الإلكتروني هنا">
            </div>

            <textarea id="question" rows="4" placeholder="اكتب سؤالك هنا بكل حرية..."></textarea>
            
            <div style="margin: 10px 0;">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:300px;height:50px"
                     data-ad-client="ca-pub-5283855307401529"></ins>
                <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
            </div>

            <button id="submitBtn" class="btn-send" onclick="sendQuestion()">إرسال السؤال</button>
        </div>

        <div class="footer-links">
            <a href="https://whatsapp.com/channel/0029Vb7Ym8MBlHpjrst9qw01" target="_blank"><i class="fab fa-whatsapp"></i> قناة الأسئلة والأجوبة</a>
            <a href="https://whatsapp.com/channel/0029Vb7KBfNIt5rqE8Uedn0p" target="_blank"><i class="fab fa-whatsapp"></i> القناة الأساسية (واتساب)</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHODkkq-DF_u1KFPhd-K-Ya1yhGDcS2WE",
            authDomain: "esaalny-3588e.firebaseapp.com",
            projectId: "esaalny-3588e",
            storageBucket: "esaalny-3588e.firebasestorage.app",
            messagingSenderId: "532010630852",
            appId: "1:532010630852:web:79e5931fa0b2ff217f1391"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "settings", "service_status"), (doc) => {
            if (doc.exists()) {
                const isClosed = doc.data().closed;
                document.getElementById('serviceContent').style.display = isClosed ? 'none' : 'block';
                document.getElementById('closedMessage').style.display = isClosed ? 'block' : 'none';
            }
        });

        window.toggleFields = () => {
            const method = document.getElementById('replyMethod').value;
            document.getElementById('telegramField').classList.toggle('hidden', method !== 'telegram');
            document.getElementById('emailField').classList.toggle('hidden', method !== 'email');
        };

        window.sendQuestion = async () => {
            const btn = document.getElementById('submitBtn');
            const lastSent = localStorage.getItem("lastSentTime");
            const now = new Date().getTime();
            
            if (lastSent && (now - lastSent < 5 * 60 * 60 * 1000)) {
                alert("مسموح بسؤال كل 5 ساعات.");
                return;
            }

            const qText = document.getElementById('question').value.trim();
            if (!qText) { alert("اكتب سؤالك!"); return; }

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            try {
                await addDoc(collection(db, "questions"), {
                    question: qText,
                    replyMethod: document.getElementById('replyMethod').value,
                    chatId: document.getElementById('chatId').value || "none",
                    userEmail: document.getElementById('userEmail').value || "none",
                    timestamp: serverTimestamp()
                });
                
                await fetch(`https://api.telegram.org/bot8326561499:AAF8y3t3Z9v2E2ryLF0gsP_gvRkZNENkmoU/sendMessage?chat_id=1797024289&text=${encodeURIComponent("🔔 سؤال جديد!\n" + qText)}`);

                localStorage.setItem("lastSentTime", now);
                alert("تم الإرسال بنجاح! شكراً لزيارتك.");
                location.reload();
            } catch (e) { 
                alert("خطأ! تأكد من اتصال الإنترنت."); 
                btn.disabled = false;
                btn.innerText = "إرسال السؤال";
            }
        };
    </script>
</body>
</html>
